name: Build Zip Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-zips:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows Zip
            os: windows-latest
            forge_platform: win32
            release_platform: windows
            artifact_name: mmd-modoki-windows-x64-zip
          - label: macOS Zip
            os: macos-latest
            forge_platform: darwin
            release_platform: mac
            artifact_name: mmd-modoki-macos-x64-zip
          - label: Linux Zip
            os: ubuntu-latest
            forge_platform: linux
            release_platform: linux
            artifact_name: mmd-modoki-linux-x64-zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build zip package
        run: npm run make:zip -- --platform=${{ matrix.forge_platform }} --arch=x64

      - name: Rename zip for release
        shell: bash
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const root=path.join(process.cwd(),'out','make'); const version=require('./package.json').version; const releasePlatform=process.env.RELEASE_PLATFORM; const walk=(dir)=>fs.readdirSync(dir,{withFileTypes:true}).flatMap((entry)=>entry.isDirectory()?walk(path.join(dir,entry.name)):path.join(dir,entry.name)); const zips=walk(root).filter((file)=>file.toLowerCase().endsWith('.zip')); if(zips.length!==1){console.error('Expected exactly one zip file, found:', zips); process.exit(1);} const source=zips[0]; const dir=path.dirname(source); const target=path.join(dir, `MMD.modoki-${releasePlatform}-x64-${version}.zip`); if(path.resolve(source)!==path.resolve(target)){ fs.renameSync(source,target); } console.log(`Renamed ${path.basename(source)} -> ${path.basename(target)}`);"
        env:
          RELEASE_PLATFORM: ${{ matrix.release_platform }}

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/make/**/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release Assets
    needs: build-zips
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built zip artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mmd-modoki-*-zip
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MMD modoki ${{ github.ref_name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: release-assets/**/*.zip
